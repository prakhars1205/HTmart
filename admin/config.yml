backend:
  name: git-gateway
  branch: main

# Where uploaded images/videos are stored in the repo, and the URL the
# live site will use to reach them.
media_folder: assets/uploads
public_folder: /assets/uploads

# All editable site content lives in content/site.json. The site's
# js/content-loader.js reads this file at runtime and fills in the page.
load_config_file: false

collections:
  - name: site
    label: Site Content
    files:
      - name: general
        label: General / Branding
        file: content/site.json
        fields:
          - { name: site_title, label: Site Title, widget: string }
          - { name: logo, label: Logo Image, widget: image }
          - { name: phone, label: Phone Number, widget: string }
          - { name: email, label: Email Address, widget: string }
          - { name: address, label: Address, widget: string }
          - label: Social Links
            name: socials
            widget: list
            fields:
              - { name: platform, label: Platform Name, widget: string }
              - { name: url, label: URL, widget: string }

          - label: Hero Section
            name: hero
            widget: object
            fields:
              - { name: badge_text, label: Badge Text, widget: string }
              - { name: heading_line1, label: Heading Line 1, widget: string }
              - { name: heading_highlight, label: Heading Highlight Word, widget: string }
              - { name: heading_line2, label: Heading Line 2 (outline style), widget: string }
              - { name: description, label: Description, widget: text }
              - { name: video, label: Showreel Video, widget: file, required: false }
              - { name: video_poster, label: Video Poster Image, widget: image, required: false }
              - { name: video_caption, label: Video Caption, widget: string }

          - label: Services
            name: services
            widget: list
            summary: '{{fields.title}}'
            fields:
              - { name: icon, label: Icon (emoji), widget: string }
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: detail, label: Detailed Description (Services page), widget: text }
              - name: tags
                label: Tags
                widget: list
                field: { name: tag, label: Tag, widget: string }

          - label: Sample Work / Portfolio
            name: portfolio
            widget: list
            summary: '{{fields.title}}'
            fields:
              - { name: title, label: Title, widget: string }
              - { name: category, label: Category, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: image, label: Cover Image, widget: image, required: false }
              - { name: video, label: Video, widget: file, required: false }

          - label: Testimonials
            name: testimonials
            widget: list
            summary: '{{fields.name}}'
            fields:
              - { name: quote, label: Quote, widget: text }
              - { name: name, label: Name, widget: string }
              - { name: role, label: Role / Company, widget: string }
              - { name: photo, label: Photo, widget: image, required: false }

          - label: Team
            name: team
            widget: list
            summary: '{{fields.name}}'
            fields:
              - { name: name, label: Name, widget: string }
              - { name: role, label: Role, widget: string }
              - { name: photo, label: Photo, widget: image, required: false }

          - label: Footer
            name: footer
            widget: object
            fields:
              - { name: tagline, label: Footer Tagline, widget: text }
              - { name: copyright, label: Copyright Line, widget: string }
